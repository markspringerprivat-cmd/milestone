<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Level · Königreich der Sinne</title>
  <link rel="stylesheet" href="style.css?v=beauty2">
  <script src="game.js?v=beauty2" defer></script>
</head>
<body data-page="level">
  <main class="level-shell">
    <header class="level-header">
      <span id="levelBadge" class="badge"></span>
    </header>

    <section class="level-grid">
      <article class="panel light-panel">
        <h2>Inhalt</h2>
        <div id="levelContent"></div>
      </article>    </section>

    <section class="panel quiz-panel">
      <h2>Quizfragen</h2>
      <p id="quizQuestion">Beantworte alle fünf Fragen richtig, um das Level abzuschließen.</p>
      <div id="quizOptions" class="quiz-options"></div>
      <section class="level-figure-strip" aria-label="Gegner">
        <img id="levelEnemy" class="hero-enemy top-enemy" alt="Gegnerbild">
      </section>
      <div class="button-line">
        <button id="checkAnswerBtn" class="game-btn primary">Aufgaben prüfen</button>
        <button id="runAwayBtn" class="game-btn muted" data-board-return>Wegrennen</button>
      </div>
      <p id="quizFeedback" class="message hidden"></p>
    </section>
  </main>

  <div id="evaluationModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card evaluation-card">
      <div class="evaluation-label" id="evaluationLabel">Frage 1</div>
      <img id="evaluationImage" class="evaluation-img" alt="Auswertung">
      <div id="evaluationStatus" class="evaluation-status hidden" aria-live="polite"></div>
      <div id="evaluationDots" class="evaluation-dots" aria-hidden="true"></div>
      <div id="evaluationAction" class="evaluation-action hidden"></div>
    </div>
  </div>

  <div id="resultModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card encounter-card">
      <img id="resultImage" class="character-img" alt="Ergebnisbild">
      <div class="encounter-text">
        <span id="resultKicker" class="kicker"></span>
        <h2 id="resultTitle"></h2>
        <p id="resultText"></p>
        <div id="resultButtons" class="button-line center"></div>
      </div>
    </div>
  </div>

  <div id="outroModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="outro-card">
      <img src="outro.webp" alt="Outrobild Königreich gerettet" class="outro-img">
      <div class="outro-actions">
        <a class="game-btn primary" href="index.html">Zum Spielbrett</a>
        <button id="outroResetBtn" class="game-btn danger">Neues Spiel</button>
      </div>
    </div>
  </div>
</body>
</html>
