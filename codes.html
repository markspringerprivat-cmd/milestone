<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR-Codes · Sinnesorgane</title>
  <link rel="stylesheet" href="style-game.css?v=9">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <script src="script-game.js?v=9" defer></script>
</head>
<body onload="initCodes()">
  <main class="shell">
    <div class="topbar">
      <div class="brand">Lehrkraftseite · QR-Codes</div>
      <nav class="nav">
        <a class="btn light" href="index.html">Zum Spielbrett</a>
        <button class="btn" onclick="window.print()">Drucken</button>
      </nav>
    </div>
    <section class="hero">
      <h1>QR-Codes für die Freischaltung</h1>
      <p>Diese Codes können ausgedruckt oder auf einem zweiten Gerät angezeigt werden. Die Lernenden klicken anschließend auf das passende Level auf dem Spielbrett und scannen den QR-Code, um das jeweilige Sinnesorgan freizuschalten.</p>
    </section>
    <section class="qr-grid" id="qrCodes"></section>
  </main>
</body>
</html>
