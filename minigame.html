<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Testspiel · Königreich der Sinne</title>
  <link rel="stylesheet" href="./css/style.css?v=v4_26_loop_audio_stability_20260525">
  <link rel="stylesheet" href="./css/v4.css?v=v4_26_loop_audio_stability_20260525">
  <script src="./js/app-v4.js?v=v4_26_loop_audio_stability_20260525" defer></script>
</head>
<body data-page="minigame">
  <main class="mini-game-page" aria-label="Testspiel">
    <section class="mini-game-stage" aria-label="Spielfeld">
      <button id="miniSettingsBtn" class="mini-settings-btn" type="button" aria-label="Optionen">⚙</button>
      <div id="miniHud" class="mini-hud" aria-live="polite">0 / 10</div>
      <div class="mini-ground" aria-hidden="true"></div>
      <img id="miniHero" class="mini-hero" src="./assets/images/minigame/mini_right_1.png" alt="Sir Nervus">
    </section>
    <nav class="mini-controls" aria-label="Steuerung">
      <div class="mini-move-controls" aria-label="Laufen">
        <button id="miniLeftBtn" class="mini-control-btn" type="button" aria-label="Nach links">←</button>
        <button id="miniRightBtn" class="mini-control-btn" type="button" aria-label="Nach rechts">→</button>
      </div>
      <div class="mini-control-spacer"></div>
      <button id="miniJumpBtn" class="mini-control-btn jump" type="button" aria-label="Springen">↑</button>
    </nav>
  </main>
  <div id="miniResult" class="mini-menu modal hidden" role="dialog" aria-modal="true" aria-labelledby="miniResultTitle">
    <div class="modal-card mini-menu-card">
      <img id="miniResultImage" class="mini-result-img hidden" alt="">
      <h2 id="miniResultTitle">Verloren</h2>
      <p id="miniResultText">Sir Nervus wurde getroffen.</p>
      <button id="miniRetryBtn" class="game-btn primary" type="button">Neuer Versuch</button>
      <button id="miniResultBoardBtn" class="game-btn muted" type="button">Zurück zum Spielbrett</button>
    </div>
  </div>
  <div id="miniMenu" class="mini-menu modal hidden" role="dialog" aria-modal="true" aria-labelledby="miniMenuTitle">
    <div class="modal-card mini-menu-card">
      <h2 id="miniMenuTitle">Optionen</h2>
      <button id="miniBackBoardBtn" class="game-btn primary" type="button">Zurück zum Spielbrett</button>
      <button id="miniCloseMenuBtn" class="game-btn muted" type="button">Weiterspielen</button>
    </div>
  </div>
</body>
</html>
