<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Testspiel · Königreich der Sinne</title>
  <link rel="stylesheet" href="style.css?v=v4_12mini_sprites_20260524">
  <link rel="stylesheet" href="v4.css?v=v4_12mini_sprites_20260524">
  <script src="app-v4.js?v=v4_12mini_sprites_20260524" defer></script>
</head>
<body data-page="minigame">
  <main class="mini-game-page" aria-label="Testspiel">
    <section class="mini-game-stage" aria-label="Spielfeld">
      <button id="miniSettingsBtn" class="mini-settings-btn" type="button" aria-label="Optionen">⚙</button>
      <div class="mini-ground" aria-hidden="true"></div>
      <img id="miniHero" class="mini-hero" src="mini_right_1.png" alt="Sir Nervus">
    </section>
    <nav class="mini-controls" aria-label="Steuerung">
      <button id="miniLeftBtn" class="mini-control-btn" type="button" aria-label="Nach links">←</button>
      <div class="mini-control-spacer"></div>
      <button id="miniJumpBtn" class="mini-control-btn jump" type="button" aria-label="Springen">↑</button>
      <button id="miniRightBtn" class="mini-control-btn" type="button" aria-label="Nach rechts">→</button>
    </nav>
  </main>
  <div id="miniMenu" class="mini-menu modal hidden" role="dialog" aria-modal="true" aria-labelledby="miniMenuTitle">
    <div class="modal-card mini-menu-card">
      <h2 id="miniMenuTitle">Optionen</h2>
      <button id="miniBackBoardBtn" class="game-btn primary" type="button">Zurück zum Spielbrett</button>
      <button id="miniCloseMenuBtn" class="game-btn muted" type="button">Weiterspielen</button>
    </div>
  </div>
</body>
</html>
