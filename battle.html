<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kampf · Königreich der Sinne</title>
  <link rel="stylesheet" href="./css/style.css?v=v4_26_loop_audio_stability_20260525">
  <link rel="stylesheet" href="./css/v4.css?v=v4_26_loop_audio_stability_20260525">
  <script src="./js/app-v4.js?v=v4_26_loop_audio_stability_20260525" defer></script>
</head>
<body data-page="battle" data-battle-mode="intro">
  <main class="battle-page" aria-label="Kampfseite">
    <section class="battle-card">
      <div id="battleIntroScene" class="battle-scene battle-intro-scene">
        <img id="battleKampfText" class="battle-kampf-text" src="./assets/images/battle/kampf_text.webp" alt="Kampf">
        <div class="battle-versus-layout">
          <div class="battle-side hero">
            <img id="battleHero" class="battle-actor" src="./assets/images/characters/held.webp" alt="Sir Nervus">
            <div class="battle-name">Sir Nervus</div>
          </div>
                    <div class="battle-side enemy">
            <img id="battleEnemy" class="battle-actor" alt="Gegner">
            <div id="battleEnemyName" class="battle-name">Gegner</div>
          </div>
        </div>
        <div class="battle-buttons">
          <button id="battleStartBtn" class="game-btn primary" type="button">Kampf starten</button>
          <button id="battleBackBtn" class="game-btn secondary" type="button">Zurück</button>
        </div>
      </div>

      <div id="battleSequenceScene" class="battle-scene battle-sequence hidden">
        <div class="battle-top">
          <div id="sequenceDots" class="battle-dots" aria-hidden="true"></div>
          <img id="sequenceTextImage" class="battle-text-img hidden" alt="">
          <div id="sequenceLabel" class="battle-label sr-only">Frage 1</div>
          <div id="sequenceStatus" class="battle-status sr-only"></div>
        </div>
        <div class="battle-stage">
          <div id="finalHint" class="battle-final-hint hidden">Tippe auf die Wolke</div>
          <img id="outcomeImage" class="battle-outcome" alt="Ergebnis">
          <img id="sequenceImage" class="battle-seq-img" alt="Auswertung">
        </div>
        <div id="battleAction" class="battle-action"></div>
      </div>
    </section>
  </main>
</body>
</html>
